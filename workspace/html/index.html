<script>
	$(document).ready(function(){
		$("#visual_slider").slick({
			autoplay: true,
			autoplaySpeed: 1000,
			arrows: false,
			dot: true,
		});


		$("#schedule_list").hide();
		$("#btn_schedule").click(function(){
			$("#btn_schedule").blur();
			$("#schedule_list").show();
			$("#schedule_list").focus();
			return false;
		});
		$("#schedule_list").keydown(function(e){
			if(e.shiftKey && e.keyCode == 9){ // Shift + Tab 키를 의미합니다.
				$("#btn_schedule").focus();
				$("#schedule_list").hide();
				return false;
			}
		});

		$("#schedule_list .btn_close").click(function(){
			$("#btn_schedule").focus();
			$("#schedule_list").hide();
		});
	});
</script>
