<section class="control_box" aria-label="화면 확대축소 및 글자 확대축소가 가능합니다.">
	<button type="button" onclick="zoomIn()">
		<img src="./assets/images/icon/magnifier-plus.png" alt="전체 브라우저 확대" />
	</button>
	<button type="button" onclick="zoomOut()">
		<img src="./assets/images/icon/magnifier-minus.png" alt="전체 브라우저 축소" />
	</button>
	<button type="button" class="control_btn control_text">
		<img src="./assets/images/icon/text.png" alt="글자크기조절 한번 누르면 확대, 다시 누르면 축소 합니다." />
	</button>
	<button type="button" class="control_btn" onclick="location.href='index.html'">
		<img src="./assets/images/icon/home.png" alt="홈" />
	</button>
</section>
