<section class="control_box" aria-label="화면 확대축소 및 글자 확대축소가 가능합니다.">
	<div class="zoom_box">
		<button type="button" onclick="zoomIn()" alt="버튼 화면 확대">

	<button type="button" class="control_btn control_text" alt="버튼 글자크기 확대 축소">

	<button type="button" class="control_btn" onclick="location.href='index.html'" alt="버튼홈으로이동">
