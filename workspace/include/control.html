<section class="control_box">
	<h2 class="blind">화면 확대축소 및 글자 확대축소가 가능합니다.</h2>
	<div class="box">
		<button type="button" onclick="zoomIn()">
			<img src="./assets/images/icon/magnifier-plus.png" alt="확대" />
		</button>
		<button type="button" onclick="zoomOut()">
			<img src="./assets/images/icon/magnifier-minus.png"
			     alt="축소" />
		</button>
	</div>
	<button type="button" class="control_btn control_text box">
		<img src="./assets/images/icon/text.png"
		     alt="글자크기조절" />
	</button>
	<button type="button" class="control_btn box" onclick="location.href='index.html'">
		<img src="./assets/images/icon/home.png" alt="홈" />
	</button>
</section>
